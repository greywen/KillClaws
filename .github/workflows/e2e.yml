name: E2E Install-Uninstall Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # OpenClaw — real npm install → scan → uninstall → verify
  # ============================================================
  e2e-openclaw:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pre-install scan (should find nothing)
        run: bash killclaws.sh --scan

      - name: Install OpenClaw via npm
        run: npm install -g openclaw@latest
        continue-on-error: true

      - name: Create OpenClaw state directories
        run: |
          mkdir -p ~/.openclaw
          echo '{"test": true}' > ~/.openclaw/openclaw.json
          mkdir -p ~/.openclaw/workspace
          echo 'test workspace' > ~/.openclaw/workspace/test.md

      - name: Post-install scan (should detect OpenClaw)
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "openclaw" || { echo "FAIL: OpenClaw not detected"; exit 1; }
          echo "PASS: OpenClaw detected"

      - name: Run KillClaws (dry-run)
        run: bash killclaws.sh --dry-run --yes

      - name: Verify dry-run preserved files
        run: |
          if [ ! -d "$HOME/.openclaw" ]; then
            echo "FAIL: dry-run should not remove anything"
            exit 1
          fi
          echo "PASS: dry-run preserved files"

      - name: Run KillClaws (actual uninstall)
        run: bash killclaws.sh --yes

      - name: Verify state directory removed
        run: |
          if [ -d "$HOME/.openclaw" ]; then
            echo "FAIL: ~/.openclaw still exists"
            ls -la ~/.openclaw/
            exit 1
          fi
          echo "PASS: ~/.openclaw removed"

      - name: Verify npm package removed
        run: |
          if npm list -g openclaw 2>/dev/null | grep -q openclaw; then
            echo "FAIL: openclaw still in npm global"
            exit 1
          fi
          echo "PASS: openclaw npm package removed"

      - name: Post-uninstall scan
        run: bash killclaws.sh --scan

  e2e-openclaw-windows:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pre-install scan
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Scan

      - name: Install OpenClaw via npm
        shell: pwsh
        run: npm install -g openclaw@latest
        continue-on-error: true

      - name: Create OpenClaw state directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.openclaw" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.openclaw\openclaw.json"

      - name: Post-install scan (should detect OpenClaw)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $output = pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Scan 2>&1 | Out-String
          Write-Host $output
          if ($output -notmatch "OpenClaw") {
            Write-Error "FAIL: OpenClaw not detected"
            exit 1
          }
          Write-Host "PASS: OpenClaw detected"

      - name: Run KillClaws (dry-run)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -DryRun -Yes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify dry-run preserved files
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:USERPROFILE\.openclaw")) {
            Write-Error "FAIL: dry-run should not remove anything"
            exit 1
          }
          Write-Host "PASS: dry-run preserved files"

      - name: Run KillClaws (actual uninstall)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Yes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify state directory removed
        shell: pwsh
        run: |
          if (Test-Path "$env:USERPROFILE\.openclaw") {
            Write-Error "FAIL: .openclaw still exists"
            exit 1
          }
          Write-Host "PASS: .openclaw removed"

      - name: Verify npm package removed
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $out = npm list -g openclaw 2>&1 | Out-String
          if ($out -match "openclaw") {
            Write-Error "FAIL: openclaw still in npm global"
            exit 1
          }
          Write-Host "PASS: openclaw npm package removed"
          exit 0

      - name: Post-uninstall scan
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Scan

  # ============================================================
  # ZeroClaw — binary install → scan → uninstall → verify
  # ============================================================
  e2e-zeroclaw:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install ZeroClaw binary
        run: |
          set -e
          ZEROCLAW_VERSION="v0.1.7"
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  ARCHIVE="zeroclaw-x86_64-unknown-linux-gnu.tar.gz" ;;
            Linux-aarch64) ARCHIVE="zeroclaw-aarch64-unknown-linux-gnu.tar.gz" ;;
            Darwin-arm64)  ARCHIVE="zeroclaw-aarch64-apple-darwin.tar.gz" ;;
            Darwin-x86_64) ARCHIVE="zeroclaw-x86_64-apple-darwin.tar.gz" ;;
            *) echo "Unsupported: $(uname -s)-$(uname -m)"; exit 1 ;;
          esac
          URL="https://github.com/zeroclaw-labs/zeroclaw/releases/download/${ZEROCLAW_VERSION}/${ARCHIVE}"
          echo "Downloading: $URL"
          curl -fsSL "$URL" -o /tmp/zeroclaw.tar.gz || true
          if [ -f /tmp/zeroclaw.tar.gz ]; then
            mkdir -p /tmp/zeroclaw-extract
            tar -xzf /tmp/zeroclaw.tar.gz -C /tmp/zeroclaw-extract 2>/dev/null || true
            BINARY=$(find /tmp/zeroclaw-extract -name "zeroclaw" -type f 2>/dev/null | head -1)
          fi
          if [ -z "${BINARY:-}" ] || [ ! -f "${BINARY:-}" ]; then
            echo "Binary not found, creating simulated install"
            mkdir -p "$HOME/.local/bin"
            printf '#!/bin/bash\necho "zeroclaw v0.1.7"\n' > "$HOME/.local/bin/zeroclaw"
            chmod +x "$HOME/.local/bin/zeroclaw"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            sudo cp "$BINARY" /usr/local/bin/zeroclaw
            sudo chmod +x /usr/local/bin/zeroclaw
          fi

      - name: Create ZeroClaw config
        run: |
          mkdir -p ~/.zeroclaw
          echo '{"version": "0.1.7"}' > ~/.zeroclaw/config.json

      - name: Scan should detect ZeroClaw
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "zeroclaw" || { echo "FAIL: ZeroClaw not detected"; exit 1; }
          echo "PASS: ZeroClaw detected"

      - name: Run KillClaws (uninstall)
        run: bash killclaws.sh --yes

      - name: Verify ZeroClaw removal
        run: |
          if [ -d "$HOME/.zeroclaw" ]; then
            echo "FAIL: ~/.zeroclaw still exists"
            exit 1
          fi
          echo "PASS: ZeroClaw config removed"

      - name: Verify ZeroClaw binary removed
        run: |
          if command -v zeroclaw >/dev/null 2>&1; then
            echo "FAIL: zeroclaw binary still exists at $(command -v zeroclaw)"
            exit 1
          fi
          echo "PASS: ZeroClaw binary removed"

  # ============================================================
  # PicoClaw — binary install → scan → uninstall → verify
  # ============================================================
  e2e-picoclaw:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install PicoClaw binary
        run: |
          set -e
          PICOCLAW_VERSION="v0.2.1"
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  ARCHIVE="picoclaw_Linux_x86_64.tar.gz" ;;
            Linux-aarch64) ARCHIVE="picoclaw_Linux_arm64.tar.gz" ;;
            Darwin-arm64)  ARCHIVE="picoclaw_Darwin_arm64.tar.gz" ;;
            Darwin-x86_64) ARCHIVE="picoclaw_Darwin_x86_64.tar.gz" ;;
            *) echo "Unsupported: $(uname -s)-$(uname -m)"; exit 1 ;;
          esac
          URL="https://github.com/sipeed/picoclaw/releases/download/${PICOCLAW_VERSION}/${ARCHIVE}"
          echo "Downloading: $URL"
          curl -fsSL "$URL" -o /tmp/picoclaw.tar.gz || true
          if [ -f /tmp/picoclaw.tar.gz ]; then
            mkdir -p /tmp/picoclaw-extract
            tar -xzf /tmp/picoclaw.tar.gz -C /tmp/picoclaw-extract 2>/dev/null || true
            BINARY=$(find /tmp/picoclaw-extract -name "picoclaw" -type f 2>/dev/null | head -1)
          fi
          if [ -z "${BINARY:-}" ] || [ ! -f "${BINARY:-}" ]; then
            echo "Binary not found, creating simulated install"
            mkdir -p "$HOME/.local/bin"
            printf '#!/bin/bash\necho "picoclaw v0.2.1"\n' > "$HOME/.local/bin/picoclaw"
            chmod +x "$HOME/.local/bin/picoclaw"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            sudo cp "$BINARY" /usr/local/bin/picoclaw
            sudo chmod +x /usr/local/bin/picoclaw
          fi

      - name: Create PicoClaw config
        run: |
          mkdir -p ~/.picoclaw
          echo '[settings]' > ~/.picoclaw/config.toml

      - name: Scan should detect PicoClaw
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "picoclaw" || { echo "FAIL: PicoClaw not detected"; exit 1; }
          echo "PASS: PicoClaw detected"

      - name: Run KillClaws (uninstall)
        run: bash killclaws.sh --yes

      - name: Verify PicoClaw removal
        run: |
          if [ -d "$HOME/.picoclaw" ]; then
            echo "FAIL: ~/.picoclaw still exists"
            exit 1
          fi
          echo "PASS: PicoClaw config removed"

      - name: Verify PicoClaw binary removed
        run: |
          if command -v picoclaw >/dev/null 2>&1; then
            echo "FAIL: picoclaw binary still exists at $(command -v picoclaw)"
            exit 1
          fi
          echo "PASS: PicoClaw binary removed"

  # ============================================================
  # KimiCLI — real pip install → scan → uninstall → verify
  # ============================================================
  e2e-kimicli:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install KimiCLI via pip
        run: pip install kimi-cli
        continue-on-error: true

      - name: Create KimiCLI config
        run: |
          mkdir -p ~/.kimi
          echo '{"api_key": "test", "model": "moonshot-v1"}' > ~/.kimi/config.json

      - name: Scan should detect KimiCLI
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "kimi" || { echo "FAIL: KimiCLI not detected"; exit 1; }
          echo "PASS: KimiCLI detected"

      - name: Run KillClaws (uninstall)
        run: bash killclaws.sh --yes

      - name: Verify KimiCLI config removed
        run: |
          if [ -d "$HOME/.kimi" ]; then
            echo "FAIL: ~/.kimi still exists"
            exit 1
          fi
          echo "PASS: KimiCLI config removed"

      - name: Verify pip package removed
        run: |
          if pip show kimi-cli 2>/dev/null; then
            echo "FAIL: kimi-cli still installed via pip"
            exit 1
          fi
          echo "PASS: KimiCLI pip package removed"

  # ============================================================
  # KimiCLI — Windows pip install → scan → uninstall → verify
  # ============================================================
  e2e-kimicli-windows:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install KimiCLI via pip
        shell: pwsh
        run: pip install kimi-cli
        continue-on-error: true

      - name: Create KimiCLI config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.kimi" | Out-Null
          '{"api_key": "test", "model": "moonshot-v1"}' | Set-Content "$env:USERPROFILE\.kimi\config.json"

      - name: Scan should detect KimiCLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $output = pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Scan 2>&1 | Out-String
          Write-Host $output
          if ($output -notmatch "KimiCLI") {
            Write-Error "FAIL: KimiCLI not detected"
            exit 1
          }
          Write-Host "PASS: KimiCLI detected"

      - name: Run KillClaws (uninstall)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Yes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify KimiCLI config removed
        shell: pwsh
        run: |
          if (Test-Path "$env:USERPROFILE\.kimi") {
            Write-Error "FAIL: .kimi still exists"
            exit 1
          }
          Write-Host "PASS: KimiCLI config removed"

      - name: Verify pip package removed
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $out = pip show kimi-cli 2>&1 | Out-String
          if ($LASTEXITCODE -eq 0 -and $out -match "kimi-cli") {
            Write-Error "FAIL: kimi-cli still installed via pip"
            exit 1
          }
          Write-Host "PASS: kimi-cli pip package removed"
          exit 0

  # ============================================================
  # WorkBuddy — real npm install → scan → uninstall → verify
  # ============================================================
  e2e-workbuddy:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install WorkBuddy (CodeBuddy) via npm
        run: npm install -g @tencent-ai/codebuddy-code
        continue-on-error: true

      - name: Create WorkBuddy config
        run: |
          mkdir -p ~/.workbuddy
          echo '{"version": "1.0.0"}' > ~/.workbuddy/config.json

      - name: Scan should detect WorkBuddy
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "workbuddy" || { echo "FAIL: WorkBuddy not detected"; exit 1; }
          echo "PASS: WorkBuddy detected"

      - name: Run KillClaws (uninstall)
        run: bash killclaws.sh --yes

      - name: Verify WorkBuddy config removed
        run: |
          if [ -d "$HOME/.workbuddy" ]; then
            echo "FAIL: ~/.workbuddy still exists"
            exit 1
          fi
          echo "PASS: WorkBuddy config removed"

      - name: Verify npm package removed
        run: |
          if npm list -g @tencent-ai/codebuddy-code 2>/dev/null | grep -q codebuddy; then
            echo "FAIL: @tencent-ai/codebuddy-code still in npm global"
            exit 1
          fi
          echo "PASS: WorkBuddy npm package removed"

  # ============================================================
  # WorkBuddy — Windows npm install → scan → uninstall → verify
  # ============================================================
  e2e-workbuddy-windows:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install WorkBuddy (CodeBuddy) via npm
        shell: pwsh
        run: npm install -g @tencent-ai/codebuddy-code
        continue-on-error: true

      - name: Create WorkBuddy config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.workbuddy" | Out-Null
          '{"version": "1.0.0"}' | Set-Content "$env:USERPROFILE\.workbuddy\config.json"

      - name: Scan should detect WorkBuddy
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $output = pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Scan 2>&1 | Out-String
          Write-Host $output
          if ($output -notmatch "WorkBuddy") {
            Write-Error "FAIL: WorkBuddy not detected"
            exit 1
          }
          Write-Host "PASS: WorkBuddy detected"

      - name: Run KillClaws (uninstall)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Yes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify WorkBuddy config removed
        shell: pwsh
        run: |
          if (Test-Path "$env:USERPROFILE\.workbuddy") {
            Write-Error "FAIL: .workbuddy still exists"
            exit 1
          }
          Write-Host "PASS: WorkBuddy config removed"

      - name: Verify npm package removed
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $out = npm list -g @tencent-ai/codebuddy-code 2>&1 | Out-String
          if ($out -match "codebuddy") {
            Write-Error "FAIL: @tencent-ai/codebuddy-code still in npm global"
            exit 1
          }
          Write-Host "PASS: WorkBuddy npm package removed"
          exit 0

  # ============================================================
  # QClaw — mock config only (GUI-only, no headless installer)
  # ============================================================
  e2e-qclaw:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Create mock QClaw config
        run: |
          mkdir -p ~/.qclaw
          echo '{"user": "test"}' > ~/.qclaw/config.json

      - name: Scan should detect QClaw
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "qclaw" || { echo "FAIL: QClaw not detected"; exit 1; }
          echo "PASS: QClaw detected"

      - name: Run KillClaws (uninstall)
        run: bash killclaws.sh --yes

      - name: Verify QClaw removal
        run: |
          if [ -d "$HOME/.qclaw" ]; then
            echo "FAIL: ~/.qclaw still exists"
            exit 1
          fi
          echo "PASS: QClaw config removed"

  # ============================================================
  # OpenClaw legacy paths — real directory cleanup
  # ============================================================
  e2e-legacy-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create legacy directories
        run: |
          mkdir -p ~/.clawdbot
          echo 'legacy clawdbot' > ~/.clawdbot/config.json
          mkdir -p ~/.molthub
          echo 'legacy moltbot' > ~/.molthub/config.json
          mkdir -p ~/clawd
          echo 'legacy workspace' > ~/clawd/test.md

      - name: Scan should detect legacy OpenClaw paths
        run: bash killclaws.sh --scan

      - name: Remove all
        run: bash killclaws.sh --yes

      - name: Verify legacy paths removed
        run: |
          FAIL=0
          for dir in ~/.clawdbot ~/.molthub ~/clawd; do
            if [ -d "$dir" ]; then
              echo "FAIL: $dir still exists"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "PASS: All legacy paths removed"

  # ============================================================
  # Dry-run safety test
  # ============================================================
  e2e-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create test data
        run: |
          mkdir -p ~/.openclaw
          echo 'test' > ~/.openclaw/test.json

      - name: Run dry-run
        run: bash killclaws.sh --dry-run --yes

      - name: Verify nothing was removed
        run: |
          if [ ! -d "$HOME/.openclaw" ]; then
            echo "FAIL: dry-run should not remove anything"
            exit 1
          fi
          echo "PASS: dry-run preserved files"

      - name: Cleanup
        run: rm -rf ~/.openclaw

  # ============================================================
  # Windows PowerShell E2E — mock config install/uninstall
  # ============================================================
  e2e-windows-multi:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Create mock configs for multiple products
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.qclaw" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.qclaw\config.json"
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.zeroclaw" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.zeroclaw\config.json"
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.picoclaw" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.picoclaw\config.toml"
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.kimi" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.kimi\config.json"

      - name: Scan should detect products
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $output = pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Scan 2>&1 | Out-String
          Write-Host $output
          foreach ($name in @("QClaw", "ZeroClaw", "PicoClaw", "KimiCLI")) {
            if ($output -notmatch $name) {
              Write-Error "FAIL: $name not detected"
              exit 1
            }
          }
          Write-Host "PASS: All products detected"

      - name: Run KillClaws (dry-run)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -DryRun -Yes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify dry-run preserved files
        shell: pwsh
        run: |
          foreach ($dir in @("$env:USERPROFILE\.qclaw", "$env:USERPROFILE\.zeroclaw")) {
            if (-not (Test-Path $dir)) {
              Write-Error "FAIL: dry-run removed $dir"
              exit 1
            }
          }
          Write-Host "PASS: dry-run preserved files"

      - name: Run KillClaws (actual uninstall)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Yes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify all removed
        shell: pwsh
        run: |
          $failed = $false
          foreach ($dir in @("$env:USERPROFILE\.qclaw", "$env:USERPROFILE\.zeroclaw", "$env:USERPROFILE\.picoclaw", "$env:USERPROFILE\.kimi")) {
            if (Test-Path $dir) {
              Write-Error "FAIL: $dir still exists"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host "PASS: All products removed"

  # ============================================================
  # .command wrapper — local mode (macOS)
  # ============================================================
  e2e-command-local:
    runs-on: macos-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Create mock product configs
        run: |
          mkdir -p ~/.qclaw
          echo '{"test": true}' > ~/.qclaw/config.json
          mkdir -p ~/.zeroclaw
          echo '{"test": true}' > ~/.zeroclaw/config.json

      - name: Run .command --scan (local .sh present)
        run: |
          chmod +x killclaws.command
          OUTPUT=$(echo "" | bash killclaws.command --scan 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "qclaw" || { echo "FAIL: QClaw not detected via .command"; exit 1; }
          echo "$OUTPUT" | grep -qi "zeroclaw" || { echo "FAIL: ZeroClaw not detected via .command"; exit 1; }
          echo "PASS: .command --scan detected products"

      - name: Run .command --yes (uninstall via wrapper)
        run: echo "" | bash killclaws.command --yes

      - name: Verify products removed
        run: |
          FAIL=0
          for dir in ~/.qclaw ~/.zeroclaw; do
            if [ -d "$dir" ]; then
              echo "FAIL: $dir still exists"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "PASS: All products removed via .command wrapper"

  # ============================================================
  # .command wrapper — download mode (macOS)
  # ============================================================
  e2e-command-download:
    runs-on: macos-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Remove killclaws.sh to force download
        run: rm -f killclaws.sh

      - name: Run .command --scan (should download .sh from GitHub)
        run: |
          chmod +x killclaws.command
          OUTPUT=$(echo "" | bash killclaws.command --scan 2>&1)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "download\|scan\|product" || { echo "FAIL: .command download mode did not produce output"; exit 1; }
          echo "PASS: .command download mode works"

      - name: Verify downloaded script exists in /tmp
        run: |
          if [ ! -f /tmp/killclaws.sh ]; then
            echo "FAIL: /tmp/killclaws.sh not found after download"
            exit 1
          fi
          echo "PASS: Downloaded killclaws.sh found in /tmp"

  # ============================================================
  # .bat wrapper — local mode (Windows)
  # ============================================================
  e2e-bat-local:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Create mock product configs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.qclaw" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.qclaw\config.json"
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.picoclaw" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.picoclaw\config.toml"

      - name: Run .bat scan (local .ps1 present)
        shell: cmd
        run: |
          echo. | killclaws.bat

      - name: Verify .bat executed ps1 (scan output)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $output = pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Scan 2>&1 | Out-String
          Write-Host $output
          if ($output -notmatch "QClaw") {
            Write-Error "FAIL: QClaw not detected"
            exit 1
          }
          Write-Host "PASS: .bat wrapper can invoke ps1 correctly"

      - name: Uninstall via ps1 directly and verify
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Yes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify products removed
        shell: pwsh
        run: |
          $failed = $false
          foreach ($dir in @("$env:USERPROFILE\.qclaw", "$env:USERPROFILE\.picoclaw")) {
            if (Test-Path $dir) {
              Write-Error "FAIL: $dir still exists"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host "PASS: All products removed via .bat wrapper flow"

  # ============================================================
  # .bat wrapper — download mode (Windows)
  # ============================================================
  e2e-bat-download:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Remove killclaws.ps1 to force download
        shell: pwsh
        run: Remove-Item -Force killclaws.ps1

      - name: Run .bat (should download ps1 from GitHub)
        shell: cmd
        run: echo. | killclaws.bat

      - name: Verify bat completed without error
        shell: pwsh
        run: |
          Write-Host "PASS: .bat download mode completed"

  # ============================================================
  # Multi-product — Linux (install all 6 products, remove all)
  # ============================================================
  e2e-multi-product-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install all products
        run: |
          # OpenClaw (npm + config)
          npm install -g openclaw@latest || true
          mkdir -p ~/.openclaw
          echo '{"test": true}' > ~/.openclaw/config.json

          # QClaw (config only)
          mkdir -p ~/.qclaw
          echo '{"test": true}' > ~/.qclaw/config.json

          # WorkBuddy (npm + config)
          npm install -g @tencent-ai/codebuddy-code || true
          mkdir -p ~/.workbuddy
          echo '{"test": true}' > ~/.workbuddy/config.json

          # ZeroClaw (binary + config)
          mkdir -p "$HOME/.local/bin"
          printf '#!/bin/bash\necho "zeroclaw v0.1.7"\n' > "$HOME/.local/bin/zeroclaw"
          chmod +x "$HOME/.local/bin/zeroclaw"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          mkdir -p ~/.zeroclaw
          echo '{"test": true}' > ~/.zeroclaw/config.json

          # PicoClaw (binary + config)
          printf '#!/bin/bash\necho "picoclaw v0.2.1"\n' > "$HOME/.local/bin/picoclaw"
          chmod +x "$HOME/.local/bin/picoclaw"
          mkdir -p ~/.picoclaw
          echo '{"test": true}' > ~/.picoclaw/config.toml

          # KimiCLI (pip + config)
          pip install kimi-cli || true
          mkdir -p ~/.kimi
          echo '{"test": true}' > ~/.kimi/config.json

          # Legacy paths
          mkdir -p ~/.clawdbot ~/.molthub ~/clawd
          echo 'legacy' > ~/.clawdbot/config.json
          echo 'legacy' > ~/.molthub/config.json
          echo 'legacy' > ~/clawd/test.md

      - name: Scan should detect all products
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          for name in OpenClaw QClaw WorkBuddy ZeroClaw PicoClaw KimiCLI; do
            echo "$OUTPUT" | grep -qi "$name" || { echo "FAIL: $name not detected"; exit 1; }
          done
          echo "PASS: All 6 products detected"

      - name: Dry-run should preserve everything
        run: |
          bash killclaws.sh --dry-run --yes
          for dir in ~/.openclaw ~/.qclaw ~/.workbuddy ~/.zeroclaw ~/.picoclaw ~/.kimi ~/.clawdbot ~/.molthub ~/clawd; do
            if [ ! -d "$dir" ]; then
              echo "FAIL: dry-run removed $dir"
              exit 1
            fi
          done
          echo "PASS: Dry-run preserved all files"

      - name: Uninstall all products
        run: bash killclaws.sh --yes

      - name: Verify all config dirs removed
        run: |
          FAIL=0
          for dir in ~/.openclaw ~/.qclaw ~/.workbuddy ~/.zeroclaw ~/.picoclaw ~/.kimi ~/.clawdbot ~/.molthub ~/clawd; do
            if [ -d "$dir" ]; then
              echo "FAIL: $dir still exists"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "PASS: All config directories removed"

      - name: Verify packages removed
        run: |
          FAIL=0
          # npm: openclaw
          if npm list -g openclaw 2>/dev/null | grep -q openclaw; then
            echo "FAIL: openclaw still in npm global"
            FAIL=1
          fi
          # pip: kimi-cli
          if pip show kimi-cli 2>/dev/null; then
            echo "FAIL: kimi-cli still installed via pip"
            FAIL=1
          fi
          # binary: zeroclaw
          if command -v zeroclaw >/dev/null 2>&1; then
            echo "FAIL: zeroclaw binary still exists"
            FAIL=1
          fi
          # binary: picoclaw
          if command -v picoclaw >/dev/null 2>&1; then
            echo "FAIL: picoclaw binary still exists"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "PASS: All packages and binaries removed"

      - name: Post-uninstall scan should find nothing
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          echo "PASS: Post-uninstall scan complete"

  # ============================================================
  # Multi-product — macOS (install all 6 products, remove all)
  # ============================================================
  e2e-multi-product-macos:
    runs-on: macos-latest
