name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -count=1 ./...

      - name: Build binary
        run: go build -ldflags "-s -w -X main.version=${{ github.sha }}" -o killclaws${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/killclaws

      - name: Run scan (smoke test)
        run: ./killclaws${{ matrix.os == 'windows-latest' && '.exe' || '' }} scan

  cross-compile:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build all platforms
        run: |
          LDFLAGS="-s -w -X main.version=${{ github.sha }}"
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/killclaws-linux-amd64       ./cmd/killclaws
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/killclaws-linux-arm64       ./cmd/killclaws
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/killclaws-darwin-amd64      ./cmd/killclaws
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/killclaws-darwin-arm64      ./cmd/killclaws
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/killclaws-windows-amd64.exe ./cmd/killclaws

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/
