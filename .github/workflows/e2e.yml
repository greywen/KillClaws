name: E2E Install-Uninstall Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # OpenClaw — real npm install → scan → uninstall → verify
  # ============================================================
  e2e-openclaw:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build KillClaws
        run: go build -o killclaws${{ matrix.os == 'windows-latest' && '.exe' || '' }} ./cmd/killclaws

      # --- Pre-install scan: should detect nothing ---
      - name: Pre-install scan
        run: ./killclaws${{ matrix.os == 'windows-latest' && '.exe' || '' }} scan --json

      # --- Install OpenClaw ---
      - name: Install OpenClaw via npm
        run: npm install -g openclaw@latest
        continue-on-error: true

      - name: Create fake OpenClaw state directory
        shell: bash
        run: |
          mkdir -p ~/.openclaw
          echo '{"test": true}' > ~/.openclaw/openclaw.json
          mkdir -p ~/.openclaw/workspace
          echo 'test workspace' > ~/.openclaw/workspace/test.md

      # --- Post-install scan: should detect OpenClaw ---
      - name: Post-install scan
        run: ./killclaws${{ matrix.os == 'windows-latest' && '.exe' || '' }} scan

      # --- Run KillClaws uninstall ---
      - name: Run KillClaws (dry-run)
        run: ./killclaws${{ matrix.os == 'windows-latest' && '.exe' || '' }} --dry-run --yes

      - name: Run KillClaws (actual uninstall)
        run: ./killclaws${{ matrix.os == 'windows-latest' && '.exe' || '' }} --yes --verbose

      # --- Verify clean removal ---
      - name: Verify state directory removed
        shell: bash
        run: |
          if [ -d "$HOME/.openclaw" ]; then
            echo "FAIL: ~/.openclaw still exists"
            ls -la ~/.openclaw/
            exit 1
          fi
          echo "PASS: ~/.openclaw removed"

      - name: Verify npm package removed
        shell: bash
        run: |
          if npm list -g openclaw 2>/dev/null | grep -q openclaw; then
            echo "FAIL: openclaw still in npm global"
            exit 1
          fi
          echo "PASS: openclaw npm package removed"

      - name: Post-uninstall scan
        run: ./killclaws${{ matrix.os == 'windows-latest' && '.exe' || '' }} scan --json

  # ============================================================
  # ZeroClaw — real binary install → scan → uninstall → verify
  # ============================================================
  e2e-zeroclaw:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build KillClaws
        run: go build -o killclaws ./cmd/killclaws

      # --- Install ZeroClaw from GitHub releases ---
      - name: Install ZeroClaw binary
        shell: bash
        run: |
          set -e
          ZEROCLAW_VERSION="v0.1.7"
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  ARCHIVE="zeroclaw-x86_64-unknown-linux-gnu.tar.gz" ;;
            Linux-aarch64) ARCHIVE="zeroclaw-aarch64-unknown-linux-gnu.tar.gz" ;;
            Darwin-arm64)  ARCHIVE="zeroclaw-aarch64-apple-darwin.tar.gz" ;;
            Darwin-x86_64) ARCHIVE="zeroclaw-x86_64-apple-darwin.tar.gz" ;;
            *) echo "Unsupported platform: $(uname -s)-$(uname -m)"; exit 1 ;;
          esac
          URL="https://github.com/zeroclaw-labs/zeroclaw/releases/download/${ZEROCLAW_VERSION}/${ARCHIVE}"
          echo "Downloading: $URL"
          curl -fsSL "$URL" -o /tmp/zeroclaw.tar.gz
          mkdir -p /tmp/zeroclaw-extract
          tar -xzf /tmp/zeroclaw.tar.gz -C /tmp/zeroclaw-extract
          # Find the binary in the extracted archive
          BINARY=$(find /tmp/zeroclaw-extract -name "zeroclaw" -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "WARN: Binary not found in archive, creating simulated install"
            mkdir -p "$HOME/.local/bin"
            echo '#!/bin/bash' > "$HOME/.local/bin/zeroclaw"
            echo 'echo "zeroclaw v0.1.7"' >> "$HOME/.local/bin/zeroclaw"
            chmod +x "$HOME/.local/bin/zeroclaw"
          else
            cp "$BINARY" /usr/local/bin/zeroclaw || sudo cp "$BINARY" /usr/local/bin/zeroclaw
            chmod +x /usr/local/bin/zeroclaw
          fi

      - name: Create ZeroClaw config directory
        run: |
          mkdir -p ~/.zeroclaw
          echo '{"version": "0.1.7", "installed": true}' > ~/.zeroclaw/config.json
          mkdir -p ~/.zeroclaw/cache
          echo 'cached data' > ~/.zeroclaw/cache/models.json

      - name: Scan should detect ZeroClaw
        run: |
          OUTPUT=$(./killclaws scan)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "zeroclaw" || { echo "FAIL: ZeroClaw not detected"; exit 1; }
          echo "PASS: ZeroClaw detected"

      - name: Run KillClaws (uninstall ZeroClaw)
        run: ./killclaws --yes --only zeroclaw --verbose

      - name: Verify ZeroClaw removal
        run: |
          if [ -d "$HOME/.zeroclaw" ]; then
            echo "FAIL: ~/.zeroclaw still exists"
            exit 1
          fi
          echo "PASS: ZeroClaw config removed"

      - name: Post-uninstall scan
        run: ./killclaws scan --json

  # ============================================================
  # PicoClaw — real binary install → scan → uninstall → verify
  # ============================================================
  e2e-picoclaw:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build KillClaws
        run: go build -o killclaws ./cmd/killclaws

      # --- Install PicoClaw from GitHub releases ---
      - name: Install PicoClaw binary
        shell: bash
        run: |
          set -e
          PICOCLAW_VERSION="v0.2.1"
          case "$(uname -s)-$(uname -m)" in
            Linux-x86_64)  ARCHIVE="picoclaw_Linux_x86_64.tar.gz" ;;
            Linux-aarch64) ARCHIVE="picoclaw_Linux_arm64.tar.gz" ;;
            Darwin-arm64)  ARCHIVE="picoclaw_Darwin_arm64.tar.gz" ;;
            Darwin-x86_64) ARCHIVE="picoclaw_Darwin_x86_64.tar.gz" ;;
            *) echo "Unsupported platform: $(uname -s)-$(uname -m)"; exit 1 ;;
          esac
          URL="https://github.com/sipeed/picoclaw/releases/download/${PICOCLAW_VERSION}/${ARCHIVE}"
          echo "Downloading: $URL"
          curl -fsSL "$URL" -o /tmp/picoclaw.tar.gz
          mkdir -p /tmp/picoclaw-extract
          tar -xzf /tmp/picoclaw.tar.gz -C /tmp/picoclaw-extract
          # Find the binary
          BINARY=$(find /tmp/picoclaw-extract -name "picoclaw" -type f | head -1)
          if [ -z "$BINARY" ]; then
            echo "WARN: Binary not found in archive, creating simulated install"
            mkdir -p "$HOME/.local/bin"
            echo '#!/bin/bash' > "$HOME/.local/bin/picoclaw"
            echo 'echo "picoclaw v0.2.1"' >> "$HOME/.local/bin/picoclaw"
            chmod +x "$HOME/.local/bin/picoclaw"
          else
            cp "$BINARY" /usr/local/bin/picoclaw || sudo cp "$BINARY" /usr/local/bin/picoclaw
            chmod +x /usr/local/bin/picoclaw
          fi

      - name: Create PicoClaw config directory
        run: |
          mkdir -p ~/.picoclaw
          echo '[settings]' > ~/.picoclaw/config.toml
          echo 'version = "0.2.1"' >> ~/.picoclaw/config.toml
          mkdir -p ~/.picoclaw/data
          echo 'device data' > ~/.picoclaw/data/devices.json

      - name: Scan should detect PicoClaw
        run: |
          OUTPUT=$(./killclaws scan)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "picoclaw" || { echo "FAIL: PicoClaw not detected"; exit 1; }
          echo "PASS: PicoClaw detected"

      - name: Run KillClaws (uninstall PicoClaw)
        run: ./killclaws --yes --only picoclaw --verbose

      - name: Verify PicoClaw removal
        run: |
          if [ -d "$HOME/.picoclaw" ]; then
            echo "FAIL: ~/.picoclaw still exists"
            exit 1
          fi
          echo "PASS: PicoClaw config removed"

      - name: Post-uninstall scan
        run: ./killclaws scan --json

  # ============================================================
  # KimiCLI — real pip install → scan → uninstall → verify
  # ============================================================
  e2e-kimicli:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build KillClaws
        run: go build -o killclaws ./cmd/killclaws

      # --- Install KimiCLI via pip ---
      - name: Install KimiCLI via pip
        run: pip install kimi-cli
        continue-on-error: true

      - name: Create KimiCLI config directory
        run: |
          mkdir -p ~/.kimi
          echo '{"api_key": "test", "model": "moonshot-v1"}' > ~/.kimi/config.json

      - name: Verify kimi-cli installed
        shell: bash
        run: |
          pip show kimi-cli || echo "WARN: kimi-cli not installed (may not be available for this platform)"

      - name: Scan should detect KimiCLI
        run: |
          OUTPUT=$(./killclaws scan)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "kimi" || { echo "FAIL: KimiCLI not detected"; exit 1; }
          echo "PASS: KimiCLI detected"

      - name: Run KillClaws (uninstall KimiCLI)
        run: ./killclaws --yes --only kimicli --verbose

      - name: Verify KimiCLI config removed
        run: |
          if [ -d "$HOME/.kimi" ]; then
            echo "FAIL: ~/.kimi still exists"
            exit 1
          fi
          echo "PASS: KimiCLI config removed"

      - name: Verify pip package removed
        shell: bash
        run: |
          if pip show kimi-cli 2>/dev/null; then
            echo "FAIL: kimi-cli still installed via pip"
            exit 1
          fi
          echo "PASS: kimi-cli pip package removed"

      - name: Post-uninstall scan
        run: ./killclaws scan --json

  # ============================================================
  # WorkBuddy — real npm install → scan → uninstall → verify
  # ============================================================
  e2e-workbuddy:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build KillClaws
        run: go build -o killclaws ./cmd/killclaws

      # --- Install WorkBuddy (CodeBuddy Code) via npm ---
      - name: Install WorkBuddy (CodeBuddy) via npm
        run: npm install -g @tencent-ai/codebuddy-code
        continue-on-error: true

      - name: Create WorkBuddy config directory
        run: |
          mkdir -p ~/.workbuddy
          echo '{"version": "1.0.0", "theme": "dark"}' > ~/.workbuddy/config.json
          mkdir -p ~/.workbuddy/sessions
          echo 'session data' > ~/.workbuddy/sessions/latest.json

      - name: Scan should detect WorkBuddy
        run: |
          OUTPUT=$(./killclaws scan)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "workbuddy" || { echo "FAIL: WorkBuddy not detected"; exit 1; }
          echo "PASS: WorkBuddy detected"

      - name: Run KillClaws (uninstall WorkBuddy)
        run: ./killclaws --yes --only workbuddy --verbose

      - name: Verify WorkBuddy config removed
        run: |
          if [ -d "$HOME/.workbuddy" ]; then
            echo "FAIL: ~/.workbuddy still exists"
            exit 1
          fi
          echo "PASS: WorkBuddy config removed"

      - name: Post-uninstall scan
        run: ./killclaws scan --json

  # ============================================================
  # QClaw — mock only (GUI-only, no headless installer)
  # ============================================================
  e2e-qclaw-mock:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build KillClaws
        run: go build -o killclaws ./cmd/killclaws

      # QClaw is GUI-only (macOS .dmg), no headless installer available.
      # Mock the config directories it would create.
      - name: Create mock QClaw config
        run: |
          mkdir -p ~/.qclaw
          echo '{"user": "test", "version": "1.0.0"}' > ~/.qclaw/config.json

      - name: Scan should detect QClaw
        run: |
          OUTPUT=$(./killclaws scan)
          echo "$OUTPUT"
          echo "$OUTPUT" | grep -qi "qclaw" || { echo "FAIL: QClaw not detected"; exit 1; }
          echo "PASS: QClaw detected"

      - name: Run KillClaws (uninstall QClaw)
        run: ./killclaws --yes --only qclaw --verbose

      - name: Verify QClaw removal
        run: |
          if [ -d "$HOME/.qclaw" ]; then
            echo "FAIL: ~/.qclaw still exists"
            exit 1
          fi
          echo "PASS: QClaw config removed"

  # ============================================================
  # OpenClaw legacy paths — real directory cleanup
  # ============================================================
  e2e-legacy-paths:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build KillClaws
        run: go build -o killclaws ./cmd/killclaws

      # Create legacy ClawdBot/Moltbot directories
      - name: Create legacy directories
        run: |
          mkdir -p ~/.clawdbot
          echo 'legacy clawdbot' > ~/.clawdbot/config.json
          mkdir -p ~/.molthub
          echo 'legacy moltbot' > ~/.molthub/config.json
          mkdir -p ~/clawd
          echo 'legacy workspace' > ~/clawd/test.md

      - name: Scan should detect OpenClaw (legacy paths)
        run: ./killclaws scan

      - name: Remove all
        run: ./killclaws --yes --verbose

      - name: Verify legacy paths removed
        run: |
          FAIL=0
          for dir in ~/.clawdbot ~/.molthub ~/clawd; do
            if [ -d "$dir" ]; then
              echo "FAIL: $dir still exists"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "PASS: All legacy paths removed"

  # ============================================================
  # Dry-run safety test
  # ============================================================
  e2e-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build KillClaws
        run: go build -o killclaws ./cmd/killclaws

      - name: Create test data
        run: |
          mkdir -p ~/.openclaw
          echo 'test' > ~/.openclaw/test.json

      - name: Run dry-run
        run: ./killclaws --dry-run --yes

      - name: Verify nothing was removed
        run: |
          if [ ! -d "$HOME/.openclaw" ]; then
            echo "FAIL: dry-run should not remove anything"
            exit 1
          fi
          echo "PASS: dry-run preserved files"

      - name: Cleanup
        run: rm -rf ~/.openclaw
