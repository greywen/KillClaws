name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Run CI checks before releasing
  ci:
    uses: ./.github/workflows/ci.yml

  # Create GitHub Release with scripts
  release:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          mkdir -p dist
          cp killclaws.sh dist/
          cp killclaws.ps1 dist/
          cp killclaws.bat dist/
          cp killclaws.command dist/
          chmod +x dist/killclaws.command
          cd dist
          tar czf killclaws-${{ steps.version.outputs.VERSION }}.tar.gz killclaws.sh killclaws.ps1 killclaws.bat killclaws.command
          zip killclaws-${{ steps.version.outputs.VERSION }}.zip killclaws.sh killclaws.ps1 killclaws.bat killclaws.command
          sha256sum *.tar.gz *.zip killclaws.sh killclaws.ps1 killclaws.bat killclaws.command > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## KillClaws ${{ steps.version.outputs.VERSION }}

            One command to remove all Claw AI products from your system.

            一条命令，卸载系统中所有 Claw AI 产品。

            ---

            ### Quick Start / 快速开始

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/greywen/KillClaws/${{ steps.version.outputs.VERSION }}/killclaws.sh | bash
            ```

            **macOS — Double-click / 双击运行:**
            Download `killclaws.command`, double-click to run in Terminal.
            下载 `killclaws.command`，双击即可在终端中运行。

            **Windows — Double-click / 双击运行:**
            Download `killclaws.bat`, double-click to run.
            下载 `killclaws.bat`，双击即可运行。

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/greywen/KillClaws/${{ steps.version.outputs.VERSION }}/killclaws.ps1 | iex
            ```

            ### Supported Products / 支持的产品
            - **OpenClaw** — npm package, services, configs, legacy paths / npm 包、服务、配置、旧路径
            - **QClaw** — App + configs / 应用 + 配置
            - **WorkBuddy** — npm package + configs / npm 包 + 配置
            - **ZeroClaw** — Binary + configs / 二进制文件 + 配置
            - **PicoClaw** — Binary + configs / 二进制文件 + 配置
            - **KimiCLI** — pip package + configs / pip 包 + 配置

            ### Downloads / 下载

            | File / 文件 | Description / 说明 |
            |------|-------------|
            | `killclaws.bat` | **Windows double-click launcher / Windows 双击运行**（推荐） |
            | `killclaws.command` | **macOS double-click launcher / macOS 双击运行**（推荐） |
            | `killclaws.sh` | Linux/macOS bash script / Linux/macOS 脚本 |
            | `killclaws.ps1` | Windows PowerShell script / Windows 脚本 |
            | `killclaws-*.tar.gz` | Archive (all scripts) / 压缩包（全部脚本） |
            | `killclaws-*.zip` | Archive (all scripts) / 压缩包（全部脚本） |
            | `checksums.txt` | SHA256 checksums / SHA256 校验和 |

            ---

            📖 [English Documentation](https://github.com/greywen/KillClaws/blob/main/README.md) | [中文文档](https://github.com/greywen/KillClaws/blob/main/README.zh-CN.md)
          files: |
            dist/killclaws.command
            dist/killclaws.bat
            dist/killclaws.sh
            dist/killclaws.ps1
            dist/killclaws-${{ steps.version.outputs.VERSION }}.tar.gz
            dist/killclaws-${{ steps.version.outputs.VERSION }}.zip
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
