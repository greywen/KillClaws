          chmod +x "$HOME/.local/bin/picoclaw"
          mkdir -p ~/.picoclaw && echo '{"test": true}' > ~/.picoclaw/config.toml

          pip install kimi-cli || true
          mkdir -p ~/.kimi && echo '{"test": true}' > ~/.kimi/config.json

          mkdir -p ~/.clawdbot ~/.molthub ~/clawd

      - name: Scan should detect all products
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          for name in OpenClaw QClaw WorkBuddy ZeroClaw PicoClaw KimiCLI; do
            echo "$OUTPUT" | grep -qi "$name" || { echo "FAIL: $name not detected"; exit 1; }
          done
          echo "PASS: All 6 products detected on macOS"

      - name: Uninstall all products
        run: bash killclaws.sh --yes

      - name: Verify all config dirs removed
        run: |
          FAIL=0
          for dir in ~/.openclaw ~/.qclaw ~/.workbuddy ~/.zeroclaw ~/.picoclaw ~/.kimi ~/.clawdbot ~/.molthub ~/clawd; do
            if [ -d "$dir" ]; then
              echo "FAIL: $dir still exists"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "PASS: All config directories removed on macOS"

      - name: Verify packages removed
        run: |
          FAIL=0
          # npm: openclaw
          if npm list -g openclaw 2>/dev/null | grep -q openclaw; then
            echo "FAIL: openclaw still in npm global"
            FAIL=1
          fi
          # pip: kimi-cli
          if pip show kimi-cli 2>/dev/null; then
            echo "FAIL: kimi-cli still installed via pip"
            FAIL=1
          fi
          # binary: zeroclaw
          if command -v zeroclaw >/dev/null 2>&1; then
            echo "FAIL: zeroclaw binary still exists"
            FAIL=1
          fi
          # binary: picoclaw
          if command -v picoclaw >/dev/null 2>&1; then
            echo "FAIL: picoclaw binary still exists"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "PASS: All packages and binaries removed"

  # ============================================================
  # Clean system — no products installed (all 3 platforms)
  # ============================================================
  e2e-clean-system:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: macos-latest
            shell: bash
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Run scan on clean system
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          echo "PASS: Scan completed on clean system without errors"

      - name: Run --yes on clean system (no-op)
        run: |
          bash killclaws.sh --yes
          echo "PASS: --yes on clean system completed without errors"

      - name: Run --dry-run on clean system
        run: |
          bash killclaws.sh --dry-run --yes
          echo "PASS: --dry-run on clean system completed without errors"

  e2e-clean-system-windows:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Run scan on clean system
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Scan
          Write-Host "PASS: Scan completed on clean Windows system"

      - name: Run -Yes on clean system (no-op)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Yes
          Write-Host "PASS: -Yes on clean system completed without errors"

      - name: Run -DryRun on clean system
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -DryRun -Yes
          Write-Host "PASS: -DryRun on clean system completed without errors"

  # ============================================================
  # Idempotency — run uninstall twice, second run must not fail
  # ============================================================
  e2e-idempotent:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Create mock product configs
        run: |
          mkdir -p ~/.openclaw ~/.qclaw ~/.zeroclaw
          echo '{"test": true}' > ~/.openclaw/config.json
          echo '{"test": true}' > ~/.qclaw/config.json
          echo '{"test": true}' > ~/.zeroclaw/config.json

      - name: First uninstall
        run: bash killclaws.sh --yes

      - name: Verify products removed
        run: |
          for dir in ~/.openclaw ~/.qclaw ~/.zeroclaw; do
            if [ -d "$dir" ]; then
              echo "FAIL: $dir still exists after first uninstall"
              exit 1
            fi
          done
          echo "PASS: All removed after first uninstall"

      - name: Second uninstall (idempotency test)
        run: |
          bash killclaws.sh --yes
          echo "PASS: Second uninstall completed without errors"

      - name: Third scan (should find nothing)
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          echo "PASS: Scan after double-uninstall works correctly"

  # ============================================================
  # Windows APPDATA paths — QClaw/WorkBuddy Windows-specific dirs
  # ============================================================
  e2e-windows-appdata:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Create Windows-specific APPDATA configs
        shell: pwsh
        run: |
          # QClaw APPDATA paths
          $qclawAppData = Join-Path $env:APPDATA "QClaw"
          $qclawLocalAppData = Join-Path $env:LOCALAPPDATA "QClaw"
          New-Item -ItemType Directory -Force -Path $qclawAppData | Out-Null
          '{"test": true}' | Set-Content (Join-Path $qclawAppData "config.json")
          New-Item -ItemType Directory -Force -Path $qclawLocalAppData | Out-Null
          '{"cache": true}' | Set-Content (Join-Path $qclawLocalAppData "cache.json")

          # QClaw user config
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.qclaw" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.qclaw\config.json"

          # WorkBuddy APPDATA paths
          $wbAppData = Join-Path $env:APPDATA "WorkBuddy"
          $wbLocalAppData = Join-Path $env:LOCALAPPDATA "WorkBuddy"
          New-Item -ItemType Directory -Force -Path $wbAppData | Out-Null
          '{"test": true}' | Set-Content (Join-Path $wbAppData "config.json")
          New-Item -ItemType Directory -Force -Path $wbLocalAppData | Out-Null
          '{"cache": true}' | Set-Content (Join-Path $wbLocalAppData "cache.json")

          # WorkBuddy user config
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.workbuddy" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.workbuddy\config.json"

          # OpenClaw APPDATA
          $ocAppData = Join-Path $env:APPDATA "OpenClaw"
          New-Item -ItemType Directory -Force -Path $ocAppData | Out-Null
          '{"test": true}' | Set-Content (Join-Path $ocAppData "config.json")
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.openclaw" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.openclaw\config.json"

      - name: Scan should detect products via APPDATA
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          $output = pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Scan 2>&1 | Out-String
          Write-Host $output
          foreach ($name in @("QClaw", "WorkBuddy", "OpenClaw")) {
            if ($output -notmatch $name) {
              Write-Error "FAIL: $name not detected via APPDATA paths"
              exit 1
            }
          }
          Write-Host "PASS: All products detected via APPDATA paths"

      - name: Uninstall all
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Yes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify user config dirs removed
        shell: pwsh
        run: |
          $failed = $false
          foreach ($dir in @("$env:USERPROFILE\.qclaw", "$env:USERPROFILE\.workbuddy", "$env:USERPROFILE\.openclaw")) {
            if (Test-Path $dir) {
              Write-Error "FAIL: $dir still exists"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host "PASS: All user config dirs removed"

      - name: Verify APPDATA dirs removed
        shell: pwsh
        run: |
          $failed = $false
          $dirs = @(
            (Join-Path $env:APPDATA "QClaw"),
            (Join-Path $env:LOCALAPPDATA "QClaw"),
            (Join-Path $env:APPDATA "WorkBuddy"),
            (Join-Path $env:LOCALAPPDATA "WorkBuddy"),
            (Join-Path $env:APPDATA "OpenClaw")
          )
          foreach ($dir in $dirs) {
            if (Test-Path $dir) {
              Write-Error "FAIL: $dir still exists"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }
          Write-Host "PASS: All APPDATA dirs removed"

  # ============================================================
  # Selective removal — remove only selected products
  # ============================================================
  e2e-selective-removal:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Create 3 product configs
        run: |
          mkdir -p ~/.openclaw ~/.qclaw ~/.zeroclaw
          echo '{"test": true}' > ~/.openclaw/config.json
          echo '{"test": true}' > ~/.qclaw/config.json
          echo '{"test": true}' > ~/.zeroclaw/config.json

      - name: Scan to verify 3 products detected
        run: |
          OUTPUT=$(bash killclaws.sh --scan 2>&1)
          echo "$OUTPUT"
          for name in OpenClaw QClaw ZeroClaw; do
            echo "$OUTPUT" | grep -qi "$name" || { echo "FAIL: $name not detected"; exit 1; }
          done
          echo "PASS: All 3 products detected"

      - name: Selective removal (choose items 1 and 3 via stdin)
        run: |
          printf "1 3\ny\n" | bash killclaws.sh || true

      - name: Verify at least one product was removed
        run: |
          REMOVED=0
          for dir in ~/.openclaw ~/.qclaw ~/.zeroclaw; do
            if [ ! -d "$dir" ]; then
              echo "Removed: $dir"
              REMOVED=$((REMOVED + 1))
            else
              echo "Kept: $dir"
            fi
          done
          if [ "$REMOVED" -eq 0 ]; then
            echo "FAIL: No products were removed by selective mode"
            exit 1
          fi
          echo "PASS: Selective removal worked ($REMOVED products removed)"

  # ============================================================
  # Windows idempotent — run uninstall twice on Windows
  # ============================================================
  e2e-windows-idempotent:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Create mock configs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.qclaw" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.qclaw\config.json"
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.zeroclaw" | Out-Null
          '{"test": true}' | Set-Content "$env:USERPROFILE\.zeroclaw\config.json"

      - name: First uninstall
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Yes
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify products removed
        shell: pwsh
        run: |
          foreach ($dir in @("$env:USERPROFILE\.qclaw", "$env:USERPROFILE\.zeroclaw")) {
            if (Test-Path $dir) {
              Write-Error "FAIL: $dir still exists"
              exit 1
            }
          }
          Write-Host "PASS: Products removed after first uninstall"

      - name: Second uninstall (idempotency)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Yes
          Write-Host "PASS: Second uninstall completed without errors"

      - name: Third scan (should find nothing)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $PSNativeCommandUseErrorActionPreference = $false
          pwsh -ExecutionPolicy Bypass -File .\killclaws.ps1 -Scan
          Write-Host "PASS: Scan after double-uninstall works correctly"
