name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Run CI checks before releasing
  ci:
    uses: ./.github/workflows/ci.yml

  # Create GitHub Release with scripts
  release:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          mkdir -p dist
          cp killclaws.sh dist/
          cp killclaws.ps1 dist/
          cp killclaws.bat dist/
          cp killclaws.command dist/
          chmod +x dist/killclaws.command
          cd dist
          tar czf killclaws-${{ steps.version.outputs.VERSION }}.tar.gz killclaws.sh killclaws.ps1 killclaws.bat killclaws.command
          zip killclaws-${{ steps.version.outputs.VERSION }}.zip killclaws.sh killclaws.ps1 killclaws.bat killclaws.command
          sha256sum *.tar.gz *.zip killclaws.sh killclaws.ps1 killclaws.bat killclaws.command > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## KillClaws ${{ steps.version.outputs.VERSION }}

            One command to remove all Claw AI products from your system.

            ### Quick Start

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/greywen/KillClaws/${{ steps.version.outputs.VERSION }}/killclaws.sh | bash
            ```

            **macOS — 双击运行:**
            下载 `killclaws.command`，双击即可在终端中运行。

            **Windows — 双击运行:**
            下载 `killclaws.bat`，双击即可运行。

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/greywen/KillClaws/${{ steps.version.outputs.VERSION }}/killclaws.ps1 | iex
            ```

            ### Supported Products
            - **OpenClaw** — npm package, services, configs, legacy paths
            - **QClaw** — App + configs
            - **WorkBuddy** — npm package + configs
            - **ZeroClaw** — Binary + configs
            - **PicoClaw** — Binary + configs
            - **KimiCLI** — pip package + configs

            ### Downloads

            | File | Description |
            |------|-------------|
            | `killclaws.command` | **macOS 双击运行** (推荐) |
            | `killclaws.bat` | **Windows 双击运行** (推荐) |
            | `killclaws.sh` | Linux/macOS bash script |
            | `killclaws.ps1` | Windows PowerShell script |
            | `killclaws-*.tar.gz` | Archive (all scripts) |
            | `killclaws-*.zip` | Archive (all scripts) |
            | `checksums.txt` | SHA256 checksums |
          files: |
            dist/killclaws.command
            dist/killclaws.bat
            dist/killclaws.sh
            dist/killclaws.ps1
            dist/killclaws-${{ steps.version.outputs.VERSION }}.tar.gz
            dist/killclaws-${{ steps.version.outputs.VERSION }}.zip
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
